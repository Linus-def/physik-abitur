<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#g)"/>
  <!-- Atom nucleus -->
  <circle cx="50" cy="50" r="6" fill="white"/>
  <!-- Orbit 1 -->
  <ellipse cx="50" cy="50" rx="30" ry="12" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9"/>
  <!-- Orbit 2 (rotated 60°) -->
  <ellipse cx="50" cy="50" rx="30" ry="12" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9" transform="rotate(60 50 50)"/>
  <!-- Orbit 3 (rotated 120°) -->
  <ellipse cx="50" cy="50" rx="30" ry="12" fill="none" stroke="white" stroke-width="2.5" stroke-opacity="0.9" transform="rotate(120 50 50)"/>
</svg>
